name: rose-pine

colors:
  # UI chrome
  divider:          "#26233a"
  spinner_frame:    "#c4a7e7"
  spinner_label:    "#6e6a86"

  # Markdown
  heading:          { color: "#c4a7e7", bold: true }
  code_inline:      "#f6c177"
  code_block:       "#9ccfd8"
  code_block_border: "#403d52"
  quote:            { color: "#6e6a86", italic: true }
  quote_border:     "#403d52"
  hr:               "#403d52"
  list_bullet:      "#eb6f92"
  link_text:        "#9ccfd8"
  link_url:         "#6e6a86"

  # Messages
  you_label:        { color: "#31748f", bold: true }
  assistant_label:  { color: "#9ccfd8", bold: true }
  tool_arrow:       "#f6c177"
  tool_result_ok:   "#6e6a86"
  tool_result_err:  "#eb6f92"
  thinking:         { color: "#6e6a86", italic: true }
  error_label:      { color: "#eb6f92", bold: true }
  dim:              "#6e6a86"
  stream_cursor:    "#e0def4"

  # Select list
  selected_label:   { color: "#c4a7e7", bold: true }
  selected_desc:    "#ebbcba"
  normal_label:     "#908caa"
  normal_desc:      "#6e6a86"
  indicator:        "#6e6a86"
  empty:            "#6e6a86"

input:
  prefix:      "✿ "
  placeholder: ""

spinner:
  frames:      ["✦", "✧", "✦", "✧"]
  interval_ms: 200
