[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = False

# External dependencies with incomplete stubs
[mypy-pygments.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-av]
ignore_missing_imports = True

[mypy-grapheme]
ignore_missing_imports = True

[mypy-uuid_extensions]
ignore_missing_imports = True

[mypy-tomli]
ignore_missing_imports = True

# Disable error checking for modules with complex types or dependencies
# on OpenAI SDK's incomplete type hints
[mypy-tau.inference.api.text.openai_responses]
ignore_errors = True

[mypy-tau.inference.api.text.service]
ignore_errors = True

